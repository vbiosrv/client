name: Docker Push & Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # нужно для GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          REV=$(git rev-parse --short HEAD)
          VERSION="${DATE}-${REV}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "rev=${REV}" >> $GITHUB_OUTPUT

      - name: Get backend info
        id: backend
        run: |
          BACKEND_REPO="vbiosrv/client"
          echo "repo=${BACKEND_REPO}" >> $GITHUB_OUTPUT

          REPO_INFO=$(curl -s "https://api.github.com/repos/${BACKEND_REPO}")
          BACKEND_BRANCH=$(echo "$REPO_INFO" | jq -r '.default_branch // "master"')

          BACKEND_INFO=$(curl -s "https://api.github.com/repos/${BACKEND_REPO}/commits/${BACKEND_BRANCH}")
          BACKEND_SHA=$(echo "$BACKEND_INFO" | jq -r '.sha // "unknown"')

          echo "branch=${BACKEND_BRANCH}" >> $GITHUB_OUTPUT
          echo "sha=${BACKEND_SHA}" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${BACKEND_REPO}/commit/${BACKEND_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FRONTEND_VERSION=${{ steps.version.outputs.version }}
            FRONTEND_BRANCH=main
            BACKEND_COMMIT_SHA=${{ steps.backend.outputs.sha }}
            BACKEND_BRANCH=${{ steps.backend.outputs.branch }}
            BACKEND_COMMIT_URL=${{ steps.backend.outputs.url }}
            BACKEND_REPO=${{ steps.backend.outputs.repo }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/client:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/client:dev
            ${{ secrets.DOCKERHUB_USERNAME }}/client:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            🚀 Auto release

            **Commit:** `${{ steps.version.outputs.rev }}`
            **Docker tag:** `${{ steps.version.outputs.version }}`

            Backend:
            - Repo: `${{ steps.backend.outputs.repo }}`
            - Branch: `${{ steps.backend.outputs.branch }}`
            - Commit: `${{ steps.backend.outputs.sha }}`
